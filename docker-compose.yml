services:
  db:
    image: postgres:16-alpine
    container_name: gdo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gdo
    ports:
      - "5432:5432"
    volumes:
      - gdo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gdo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gdo_pgdata:
